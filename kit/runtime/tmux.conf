# Kit-shipped tmux.conf for the bot user.
#
# Installed into $HOME/.tmux.conf at first-time-setup. If the user
# already has one, the install step skips (cp -n) so an operator's
# customizations aren't clobbered.
#
# Why these settings:
# - mouse on: scroll + select panes via the web shell / SSH terminal.
#   Without this, mouse wheel scrolls the host terminal's scrollback
#   instead of tmux's, and the bot's pane is unscrollable.
# - set-clipboard on: lets tmux copy out via OSC 52, which the web
#   shell's xterm.js relays to the operator's host clipboard.
# - allow-passthrough on: required for some terminal-emulator escape
#   sequences (kitty graphics protocol, etc.) to reach the actual
#   terminal under tmux.
# - default-terminal tmux-256color + terminal-overrides ',xterm*:Tc':
#   24-bit colour for status bar themes and modern TUIs.
# - LANG=C.utf8: tmux checks UTF-8 per-client; without this, glyph
#   rendering breaks (the four-shell-context lesson from fenbot
#   2026-04-03).
# - history-limit 50000: lets `tmux capture-pane -S -<N>` reach far
#   enough back for cron prompts that scroll fast.
# - status bar with <BOT_NAME>: identifies the session at a glance.

set -g mouse on
set -g set-clipboard on
set -g allow-passthrough on
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm*:Tc'
set-environment -g LANG C.utf8
set -g history-limit 50000

# Bare PgUp enters copy-mode and scrolls one page up. Once inside copy-
# mode, PgUp/PgDn use the default copy-mode bindings (page-up / page-down).
# The `-e` flag exits copy-mode automatically when scrolled back to the
# bottom, so PgDn at the live view stays a no-op (nothing below the live
# view to page down to) while PgDn inside copy-mode pages forward
# normally. Without this, bare PgUp gets passed through to whatever is
# running in the pane (claude-code), which doesn't scroll tmux history.
bind-key -n PageUp copy-mode -eu

# Status bar — show <BOT_NAME>
set -g status on
set -g status-style "bg=#313244,fg=#cdd6f4"
set -g status-left "#[fg=#1e1e2e,bg=#fab387,bold] <BOT_NAME> #[default]│ "
set -g status-right "#[fg=#6c7086]%H:%M %Y-%m-%d"
set -g status-left-length 20
